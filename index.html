<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generadores de Texto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-animation"></div>

    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1>Generadores</h1>
                    <p class="subtitle">Crea texto de prueba de forma rápida y sencilla</p>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema oscuro">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <main class="widgets">
            <!-- Widget 1: Lorem Ipsum -->
            <div class="widget" data-widget="lorem">
                <div class="widget-header">
                    <div class="widget-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </div>
                    <div>
                        <h2>Lorem Ipsum</h2>
                        <p class="widget-desc">Párrafos de texto de relleno</p>
                    </div>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label for="paragraph-count">Párrafos</label>
                        <select id="paragraph-count">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <button id="generate-btn" class="btn btn-primary">
                        <span class="btn-text">Generar</span>
                        <span class="btn-icon">→</span>
                    </button>
                </div>

                <div class="textarea-wrapper">
                    <textarea id="output" placeholder="Tu Lorem Ipsum aparecerá aquí..." readonly></textarea>
                    <div class="textarea-footer">
                        <span id="char-count" class="char-count">0 caracteres</span>
                        <button id="copy-btn" class="btn-copy" disabled>
                            <span class="copy-icon">📋</span>
                            <span class="copy-text">Copiar</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Widget 2: Emails -->
            <div class="widget" data-widget="email">
                <div class="widget-header">
                    <div class="widget-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <path d="m22 7-10 5L2 7"></path>
                        </svg>
                    </div>
                    <div>
                        <h2>Email de prueba</h2>
                        <p class="widget-desc">Genera un email ficticio</p>
                    </div>
                </div>

                <div class="controls">
                    <button id="email-btn" class="btn btn-primary">
                        <span class="btn-text">Generar</span>
                        <span class="btn-icon">→</span>
                    </button>
                </div>

                <div class="textarea-wrapper">
                    <textarea id="email-output" placeholder="Tus emails aparecerán aquí..." readonly></textarea>
                    <div class="textarea-footer">
                        <span class="char-count">0 caracteres</span>
                        <button id="email-copy-btn" class="btn-copy" disabled>
                            <span class="copy-icon">📋</span>
                            <span class="copy-text">Copiar</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Widget 3: Contraseñas -->
            <div class="widget" data-widget="password">
                <div class="widget-header">
                    <div class="widget-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <div>
                        <h2>Contraseña</h2>
                        <p class="widget-desc">Genera contraseñas seguras</p>
                    </div>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label for="password-length">Longitud</label>
                        <select id="password-length">
                            <option value="8">8</option>
                            <option value="12">12</option>
                            <option value="16" selected>16</option>
                            <option value="20">20</option>
                            <option value="24">24</option>
                            <option value="32">32</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="password-complexity">Complejidad</label>
                        <select id="password-complexity">
                            <option value="low">Baja (letras y números)</option>
                            <option value="medium" selected>Media (mayús + minús + números)</option>
                            <option value="high">Alta (+ símbolos especiales)</option>
                        </select>
                    </div>
                    <button id="password-btn" class="btn btn-primary">
                        <span class="btn-text">Generar</span>
                        <span class="btn-icon">→</span>
                    </button>
                </div>

                <div class="textarea-wrapper">
                    <textarea id="password-output" placeholder="Tus contraseñas aparecerán aquí..." readonly></textarea>
                    <div class="textarea-footer">
                        <span class="char-count">0 caracteres</span>
                        <button id="password-copy-btn" class="btn-copy" disabled>
                            <span class="copy-icon">📋</span>
                            <span class="copy-text">Copiar</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
